# SwiftLint configuration — WalkForge
# Règles strictes : zéro warning toléré en CI.

strict: true

included:
  - Packages

excluded:
  - "**/.build"
  - "**/Build"
  - "**/DerivedData"
  - "**/.swiftpm"

disabled_rules:
  - trailing_whitespace
  - todo
  - trailing_comma            # Convention projet : toujours des trailing commas (stabilité diff)
  - modifier_order            # Conflit avec nonisolated(unsafe) — règles Swift 6 pas encore intégrées
  - blanket_disable_command   # Tolérer les disables per-file pour identifier_name dans les tests Swift Testing

opt_in_rules:
  - array_init
  - attributes
  - closure_end_indentation
  - closure_spacing
  - collection_alignment
  - contains_over_filter_count
  - contains_over_filter_is_empty
  - contains_over_first_not_nil
  - contains_over_range_nil_comparison
  - convenience_type
  - empty_collection_literal
  - empty_count
  - empty_string
  - explicit_init
  - fallthrough
  - fatal_error_message
  - first_where
  - flatmap_over_map_reduce
  - force_unwrapping
  - identical_operands
  - implicit_return
  - joined_default_parameter
  - last_where
  - legacy_multiple
  - legacy_random
  - literal_expression_end_indentation
  - lower_acl_than_parent
  - multiline_arguments
  - operator_usage_whitespace
  - overridden_super_call
  - prefer_self_type_over_type_of_self
  - prefer_zero_over_explicit_init
  - redundant_nil_coalescing
  - redundant_type_annotation
  - sorted_imports
  - static_operator
  - toggle_bool
  - unneeded_parentheses_in_closure_argument
  - yoda_condition

analyzer_rules:
  - unused_import

line_length:
  warning: 120
  error: 150
  ignores_urls: true
  ignores_comments: false

function_body_length:
  warning: 80
  error: 120

type_body_length:
  warning: 300
  error: 450

file_length:
  warning: 500
  error: 700

cyclomatic_complexity:
  warning: 15
  error: 20

identifier_name:
  min_length:
    warning: 2
  max_length:
    warning: 50
    error: 60
  excluded:
    - id
    - i
    - x
    - y
    - z

type_name:
  min_length: 3
  max_length:
    warning: 50
    error: 60

nesting:
  type_level:
    warning: 2

force_cast: error
force_try: error
force_unwrapping: error
