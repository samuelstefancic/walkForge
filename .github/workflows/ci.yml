name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch: # déclenchement manuel depuis l'UI

# Annule les runs CI en cours pour la même branche quand un nouveau commit est poussé.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (SwiftLint + SwiftFormat)
    # macos-15 = runner M-series Apple Silicon (Xcode 16+).
    # Multiplier 10× par rapport à Ubuntu : à surveiller.
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Library/Taps
          key: brew-${{ runner.os }}-swiftlint-swiftformat
          restore-keys: brew-${{ runner.os }}-

      - name: Install SwiftLint + SwiftFormat
        run: brew install swiftlint swiftformat

      - name: SwiftLint (strict)
        run: swiftlint --strict

      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .

  test-package:
    name: Test ${{ matrix.package }}
    runs-on: macos-15
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        package: [DomainKit, BLECore, DesignSystem]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain info
        run: |
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: Packages/${{ matrix.package }}/.build
          key: spm-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles(format('Packages/{0}/Package.swift', matrix.package)) }}
          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.package }}-

      - name: Build
        working-directory: Packages/${{ matrix.package }}
        run: swift build --build-tests

      - name: Test
        working-directory: Packages/${{ matrix.package }}
        run: swift test --parallel --enable-code-coverage

  build-ios:
    name: Build iOS (Simulator)
    runs-on: macos-15
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Library/Taps
          key: brew-${{ runner.os }}-xcodegen-xcbeautify
          restore-keys: brew-${{ runner.os }}-

      - name: Install XcodeGen + xcbeautify
        run: brew install xcodegen xcbeautify

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Pick available iPhone simulator
        id: sim
        run: |
          NAME=$(xcrun simctl list devices available | grep -Eo "iPhone [0-9]+( Pro)?" | head -1)
          echo "Using simulator: $NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      - name: Build for iOS Simulator
        run: |
          set -o pipefail
          xcodebuild \
            -project WalkForge.xcodeproj \
            -scheme WalkForge \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }},OS=latest" \
            -configuration Debug \
            CODE_SIGNING_ALLOWED=NO \
            build 2>&1 | xcbeautify
