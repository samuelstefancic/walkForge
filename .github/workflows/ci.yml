name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]
  workflow_dispatch:  # déclenchement manuel depuis l'UI

# Annule les runs CI en cours pour la même branche quand un nouveau commit est poussé.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (SwiftLint + SwiftFormat)
    # macos-15 = runner M-series Apple Silicon (Xcode 16+).
    # Multiplier 10× par rapport à Ubuntu : à surveiller.
    runs-on: macos-15
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Cache Homebrew
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/Homebrew
            /opt/homebrew/Library/Taps
          key: brew-${{ runner.os }}-swiftlint-swiftformat
          restore-keys: brew-${{ runner.os }}-

      - name: Install SwiftLint + SwiftFormat
        run: |
          brew install swiftlint swiftformat

      - name: SwiftLint (strict)
        run: swiftlint --strict

      - name: SwiftFormat (lint mode)
        run: swiftformat --lint .

  test:
    name: Build + Test (${{ matrix.package }})
    runs-on: macos-15
    timeout-minutes: 15

    strategy:
      fail-fast: false
      matrix:
        package: [DomainKit, BLECore]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16+
        # Prend la dernière version stable disponible sur le runner.
        run: |
          sudo xcode-select -p
          xcodebuild -version
          swift --version

      - name: Cache SwiftPM build
        uses: actions/cache@v4
        with:
          path: Packages/${{ matrix.package }}/.build
          key: spm-${{ runner.os }}-${{ matrix.package }}-${{ hashFiles(format('Packages/{0}/Package.swift', matrix.package)) }}
          restore-keys: |
            spm-${{ runner.os }}-${{ matrix.package }}-

      - name: Build
        working-directory: Packages/${{ matrix.package }}
        run: swift build --build-tests

      - name: Test
        working-directory: Packages/${{ matrix.package }}
        run: swift test --parallel --enable-code-coverage
